version: '3.9'
name: blockscout-potos-db

services:
  redis-db:
    extends:
      file: ../services/redis.yml
      service: redis-db
    ports:
      - target: 6379
        published: ${REDIS_PORT:-6379}

  db-init:
    extends:
      file: ../services/db.yml
      service: db-init

  db:
    depends_on:
      db-init:
        condition: service_completed_successfully
    extends:
      file: ../services/db.yml
      service: db
    # Upstream db.yml already publishes 5432 → 7432. Override only if needed via DB_PORT.
    ports:
      - target: 5432
        published: ${DB_PORT:-7432}

  stats-db-init:
    extends:
      file: ../services/stats.yml
      service: stats-db-init

  stats-db:
    depends_on:
      stats-db-init:
        condition: service_completed_successfully
    extends:
      file: ../services/stats.yml
      service: stats-db
    ports:
      - target: 5432
        published: ${STATS_DB_PORT:-7433}
